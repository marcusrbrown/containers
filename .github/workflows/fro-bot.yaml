---
name: Fro Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  discussion_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, review_requested]
  schedule:
    - cron: '30 14 * * *' # Daily at 14:30 UTC
  workflow_dispatch:
    inputs:
      prompt:
        description: Custom prompt for the Fro Bot agent
        required: true

permissions:
  contents: read

concurrency:
  group: >-
    fro-bot-${{
      github.event.issue.number ||
      github.event.pull_request.number ||
      github.event.discussion.number ||
      github.run_id
    }}
  cancel-in-progress: false

env:
  PR_REVIEW_PROMPT: |
    Review this container/automation PR focusing on:
    - Dockerfile best practices: pinned base images, minimal layers, non-root users, cache cleanup
    - Multi-architecture correctness ($TARGETPLATFORM / $TARGETARCH usage)
    - Python script quality: type hints, error handling, subprocess safety
    - GitHub Actions security: SHA-pinned actions, minimal permissions, no secret leaks
    - Breaking changes to container images or Poetry script entry points
    Skip style nits — Black, isort, Prettier, and pre-commit handle formatting.

    Do NOT push commits, modify code, or create branches. Review only.
    Use inline comments for file-specific issues. Reserve the review body
    for the structured summary below.

    You MUST structure your review using exactly these headings:
    ## Verdict: [PASS | CONDITIONAL | REJECT]
    CONDITIONAL = can merge after addressing the listed blocking issues.
    ### Blocking issues
    ### Non-blocking concerns
    ### Missing tests
    ### Risk assessment (LOW/MED/HIGH) + rationale
    Evaluate likelihood of regression, security exposure, or blast radius.
    If a section has no items, write "None" under the heading.
    Do not omit any heading.

  SCHEDULE_PROMPT: |
    Perform daily repository autohealing. Work through each category in order,
    making commits and pushing fixes directly where possible.

    1. ERRORED PRs: Find open PRs with failing CI checks. Check out each PR branch,
       diagnose the failure from the check logs, fix the issue, and push the fix.
       Comment on the PR explaining what was fixed.

    2. SECURITY: Review Dependabot/Renovate alerts and open PRs for vulnerable deps.
       If a security update PR exists but has conflicts or failures, fix and push.
       For unaddressed critical/high advisories, create a PR with the fix.

    3. HEALTH & MAINTENANCE: Check for outdated major versions of dependencies in
       pyproject.toml, package.json, and GitHub Actions workflow files. Create PRs
       to migrate to current major versions (one PR per major bump). Pin any
       unpinned GitHub Actions with SHA256 hashes.

    4. DEVELOPER EXPERIENCE: Ensure consistent linting, formatting, and static
       analysis across the repo. Run `pre-commit run --all-files` and fix any
       failures. Verify Black, isort, Prettier, yamllint, and dockerfilelint
       configs are consistent and applied. Fix any drift.

    ## SINGLE ISSUE MANAGEMENT

    Instead of creating new daily issues, you must manage a SINGLE perpetual issue:

    ### Finding the Perpetual Issue
    1. Search for an open issue titled "Daily Autohealing Report" (exact match)
    2. If found, use that issue for all updates
    3. If not found, create a new issue with that exact title

    ### Updating the Issue
    After completing all work, ADD a dated update section to the TOP of the issue body:

    ```markdown
    ## Update — YYYY-MM-DD

    ### Summary
    | Category | Status | Actions |
    |----------|--------|---------|
    | ERRORED PRs | status indicator | description |
    | SECURITY | status indicator | description |
    | HEALTH & MAINTENANCE | status indicator | description |
    | DEVELOPER EXPERIENCE | status indicator | description |

    ### Tasks for Fro Bot
    - [ ] Task description (PAT-powered, multi-item work)
    - [ ] Task description (PAT-powered, multi-item work)

    ### Tasks for Copilot
    - [ ] Task description (assigned task → single PR)

    ### Items Needing Human Attention
    - Description of blockers or decisions needed

    ---
    ```

    ### Important Rules
    - DO NOT create new daily issues
    - DO NOT close the perpetual issue
    - ALWAYS prepend new updates to existing content
    - Use the Task structure above for delegation to Fro Bot and Copilot agents

    Do NOT comment on individual issues. Update the single perpetual issue only.

jobs:
  fro-bot:
    name: Fro Bot
    runs-on: ubuntu-latest
    if: >-
      (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]')
        )
      ) && (
        (
          github.event_name == 'issues' &&
          !endsWith(github.event.issue.user.login || '', '[bot]') &&
          (github.event.issue.user.login || '') != 'fro-bot'
        ) ||
        (
          github.event_name == 'pull_request' &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]') &&
          (github.event.pull_request.user.login || '') != 'fro-bot'
        ) ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'discussion_comment') &&
          contains(github.event.comment.body || '', '@fro-bot') &&
          (github.event.comment.user.login || '') != 'fro-bot' &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || '')
        )
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Install Node.js dependencies
        run: pnpm install

      - name: Run Fro Bot
        uses: fro-bot/agent@edd5fc30a6da4deb994274e1e0fbe33c3db8b3ad # v0.38.0
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PROMPT: >-
            ${{
              (github.event_name == 'workflow_dispatch' && (github.event.inputs.prompt || ''))
              || (github.event_name == 'schedule' && env.SCHEDULE_PROMPT)
              || (github.event_name == 'pull_request' && env.PR_REVIEW_PROMPT)
              || ''
            }}
        with:
          github-token: ${{ secrets.FRO_BOT_PAT }}
          auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
          model: ${{ vars.FRO_BOT_MODEL }}
          prompt: ${{ env.PROMPT }}
